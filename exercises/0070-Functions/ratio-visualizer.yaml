title: "Ratio Visualizer"
descriptionMd: |
  # Ratio Visualizer

  In this exercise you will visualize a random number between 0 and 100
  as a grid of circles, similar to a progress bar, but in 2D.

  ![Ratio Visualizer](https://raw.githubusercontent.com/rstropek/ts-web-playground/refs/heads/main/exercises/0070-Functions/ratio_visualizer.png)

  ## Your Task

  A 10x10 grid represents 100 units. A random number `n` determines how many
  circles are colored. Circles are counted **left-to-right, top-to-bottom**,
  so the first `n` circles are filled and the rest are empty.

  Write two functions (you decide on names and parameters):

  1. A function that **determines whether a given circle should be colored**,
     based on its position in the grid and the random number.

  2. A function that **draws a single circle** at the current origin,
     styled differently depending on whether it is colored or not.

  ## In `setup()`

  Once your functions are ready, add the drawing logic:

  1. Display the random number as a title (centered, near the top)
  2. Use `translate` to move the origin to the center of the first circle
  3. Draw all 100 circles in a nested loop using your two functions

sampleSolution: "https://raw.githubusercontent.com/rstropek/ts-web-playground/refs/heads/main/exercises/0070-Functions/ratio_visualizer.ts"
